org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
org.gradle.offline=false
# أقل تنزيلات متوازية — أحياناً يقلّل Connection reset على شبكات ضعيفة
org.gradle.parallel=false
kotlin.code.style=official
# يتفادى "Could not connect to Kotlin compile daemon" (غالباً Defender أو عملية منفصلة)
kotlin.compiler.execution.strategy=in-process
android.nonTransitiveRClass=true
# مهلة أطول عند ضعف الشبكة (تنزيل Gradle والمستودعات)
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.org.gradle.internal.http.socketTimeout=180000
# بعض جدران الحماية/البروكسيات تعيد تعيين الاتصال مع keep-alive
systemProp.http.keepAlive=false
systemProp.https.keepAlive=false
